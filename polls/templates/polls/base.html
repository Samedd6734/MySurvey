<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MySurvey - Modern anket platformu">
    <title>{% block title %}MySurvey{% endblock %}</title>

    <!-- Google Fonts: Inter + Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans:    ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Outfit', 'Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            primary:   '#0EA5E9',
                            secondary: '#06B6D4',
                            accent:    '#F59E0B',
                            success:   '#10B981',
                            danger:    '#EF4444',
                        },
                        surface: {
                            DEFAULT:  '#0F172A',
                            card:     '#1E293B',
                            elevated: '#273549',
                            border:   'rgba(148,163,184,0.12)',
                        },
                        ink: {
                            DEFAULT: '#F1F5F9',
                            muted:   '#94A3B8',
                            faint:   '#475569',
                        }
                    },
                }
            }
        }
    </script>

    <style>
        /* ===== RESET ===== */
        *, *::before, *::after { box-sizing: border-box; }

        /* ===== CSS CUSTOM PROPERTIES (şablon dosyaları kullanıyor) ===== */
        :root {
            --text-main:    #F1F5F9;
            --text-muted:   #94A3B8;
            --text-faint:   #475569;
            --bg-elevated:  #273549;
            --border-color: rgba(148, 163, 184, 0.12);
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar              { width: 6px; }
        ::-webkit-scrollbar-track        { background: #0F172A; }
        ::-webkit-scrollbar-thumb        { background: #334155; border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover  { background: #475569; }

        /* ===== AUTOFILL FIX ===== */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #0F172A inset !important;
            -webkit-text-fill-color: #F1F5F9 !important;
        }

        /* ===== BASE ===== */
        body {
            background-color: #0F172A;
            color: #F1F5F9;
            min-height: 100vh;
        }

        /* ===== AMBIENT BACKGROUND ===== */
        #bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: #0F172A;
        }

        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            will-change: transform, opacity;
        }

        /* Blob 1: Büyük mavi — sol üst */
        #blob1 {
            width: 750px; height: 750px;
            background: radial-gradient(circle, rgba(14,165,233,0.18) 0%, transparent 70%);
            top: -250px; left: -150px;
            filter: blur(80px);
            animation: floatA 22s infinite alternate ease-in-out;
        }

        /* Blob 2: Orta cyan — sağ orta */
        #blob2 {
            width: 620px; height: 620px;
            background: radial-gradient(circle, rgba(6,182,212,0.14) 0%, transparent 70%);
            top: 15%; right: -180px;
            filter: blur(90px);
            animation: floatB 28s infinite alternate ease-in-out;
        }

        /* Blob 3: Küçük amber — alt orta */
        #blob3 {
            width: 480px; height: 480px;
            background: radial-gradient(circle, rgba(245,158,11,0.10) 0%, transparent 70%);
            bottom: -130px; left: 35%;
            filter: blur(100px);
            animation: floatC 35s infinite alternate ease-in-out;
        }

        /* Blob 4: Pembe/mor — sağ alt (bonus derinlik) */
        #blob4 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%);
            bottom: 10%; right: 10%;
            filter: blur(110px);
            animation: floatD 40s infinite alternate ease-in-out;
        }

        @keyframes floatA {
            0%   { transform: translate(0,   0)    scale(1);    opacity: 0.4; }
            30%  { transform: translate(40px, 60px) scale(1.08); opacity: 0.7; }
            60%  { transform: translate(-20px,80px) scale(0.95); opacity: 0.5; }
            100% { transform: translate(20px,-40px) scale(1.05); opacity: 0.6; }
        }
        @keyframes floatB {
            0%   { transform: translate(0,   0)     scale(1);    opacity: 0.3; }
            40%  { transform: translate(-50px,30px)  scale(1.1);  opacity: 0.6; }
            70%  { transform: translate(30px, 60px)  scale(0.92); opacity: 0.4; }
            100% { transform: translate(-20px,-30px) scale(1.04); opacity: 0.5; }
        }
        @keyframes floatC {
            0%   { transform: translate(0,   0)    scale(1);    opacity: 0.35; }
            50%  { transform: translate(-60px,-40px) scale(1.12); opacity: 0.65; }
            100% { transform: translate(40px, 50px)  scale(0.9);  opacity: 0.4; }
        }
        @keyframes floatD {
            0%   { transform: translate(0,    0)    scale(1);    opacity: 0.25; }
            35%  { transform: translate(-30px,50px)  scale(1.08); opacity: 0.50; }
            100% { transform: translate(50px,-20px)  scale(0.95); opacity: 0.30; }
        }

        /* ===== GLASS CARD ===== */
        .glass-card {
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(148, 163, 184, 0.12);
            box-shadow:
                0 0 0 1px rgba(14, 165, 233, 0.04),
                0 20px 60px -12px rgba(0, 0, 0, 0.4),
                0 4px 16px -4px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .glass-card:hover {
            border-color: rgba(14, 165, 233, 0.2);
            box-shadow:
                0 0 0 1px rgba(14, 165, 233, 0.08),
                0 24px 70px -10px rgba(0, 0, 0, 0.45),
                0 0 30px -8px rgba(14,165,233,0.15),
                inset 0 1px 0 rgba(255,255,255,0.06);
        }

        /* ===== NAVBAR ===== */
        .nav-glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow:
                0 4px 30px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(14, 165, 233, 0.04),
                inset 0 1px 0 rgba(255,255,255,0.03);
        }

        /* ===== NAV LINK ===== */
        .nav-link {
            position: relative;
            transition: background 0.2s ease, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 4px; left: 30%; right: 30%;
            height: 2px;
            background: linear-gradient(90deg, #0EA5E9, #06B6D4);
            border-radius: 9999px;
            transform: scaleX(0);
            opacity: 0;
            transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease;
        }
        .nav-link:hover::after { transform: scaleX(1); opacity: 1; }
        .nav-link:hover { transform: translateY(-1px); }

        .nav-item-text { color: #94A3B8; transition: color 0.2s ease; }
        .nav-item-text:hover { color: #F1F5F9; }
        .nav-hover-bg:hover { background: rgba(39, 53, 73, 0.55); }

        /* ===== LOGO ===== */
        .logo-icon {
            width: 32px; height: 32px; border-radius: 10px;
            background: linear-gradient(135deg, #0EA5E9 0%, #06B6D4 100%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 14px rgba(14, 165, 233, 0.4);
            flex-shrink: 0;
            transition: box-shadow 0.3s ease;
        }

        /* ===== GLOW BUTTON ===== */
        .btn-glow {
            position: relative; overflow: hidden;
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
                        box-shadow 0.25s ease;
        }
        .btn-glow:hover {
            transform: translateY(-2px) scale(1.025);
        }
        .btn-glow:active {
            transform: scale(0.96) translateY(0);
            transition-duration: 0.08s;
        }
        .btn-glow::after {
            content: '';
            position: absolute;
            top: 0; left: -80%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
            transform: skewX(-20deg);
            transition: left 0.5s ease;
        }
        .btn-glow:hover::after { left: 130%; }

        /* ===== SHIMMER ===== */
        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; right: 0; bottom: 0;
            width: 60%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
            animation: shimmer 3s infinite ease-in-out;
        }
        @keyframes shimmer { 100% { transform: translateX(400%); } }

        /* ===== CARD HOVER LIFT ===== */
        .card-hover {
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1),
                        box-shadow 0.35s ease,
                        border-color 0.25s ease;
        }
        .card-hover:hover {
            transform: translateY(-6px) scale(1.012);
            box-shadow: 0 20px 50px -10px rgba(14,165,233,0.15), 0 8px 24px -4px rgba(0,0,0,0.35);
        }
        .card-hover:active { transform: translateY(-2px) scale(1.004); transition-duration: 0.1s; }

        /* ===== INTERACTIVE ICON BOUNCE ===== */
        .icon-bounce {
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .icon-bounce:hover { transform: scale(1.18) rotate(-4deg); }

        /* ===== STAT CARD HOVER ===== */
        .stat-card {
            transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1),
                        box-shadow 0.3s ease,
                        border-color 0.25s ease;
            cursor: default;
        }
        .stat-card:hover {
            transform: translateY(-3px) scale(1.025);
            border-color: rgba(14,165,233,0.22);
            box-shadow: 0 12px 40px -8px rgba(14,165,233,0.12), 0 4px 16px -4px rgba(0,0,0,0.3);
        }

        /* ===== PULSE DOT ===== */
        .pulse-dot {
            width: 8px; height: 8px;
            background: #10B981;
            border-radius: 50%;
            position: relative;
        }
        .pulse-dot::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.4);
            animation: pulseDot 2s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50%       { transform: scale(1.8); opacity: 0; }
        }

        /* ===== GRADIENT TEXT ===== */
        .gradient-text {
            background: linear-gradient(135deg, #0EA5E9 0%, #06B6D4 50%, #10B981 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 4s ease-in-out infinite alternate;
            background-size: 200%;
        }
        @keyframes gradientShift {
            0%   { background-position: 0%; }
            100% { background-position: 100%; }
        }

        /* ===== ENTRANCE ANIMATION ===== */
        .fade-up {
            opacity: 0;
            transform: translateY(24px);
            animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        .fade-up-d1 { animation-delay: 0.05s; }
        .fade-up-d2 { animation-delay: 0.12s; }
        .fade-up-d3 { animation-delay: 0.20s; }
        .fade-up-d4 { animation-delay: 0.30s; }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Legacy alias — index.html'de kullanılıyor */
        .fade-in {
            opacity: 0;
            animation: fadeUp 0.65s cubic-bezier(0.16,1,0.3,1) 0.05s forwards;
        }

        /* ===== GLOW BORDER ===== */
        .glow-border {
            position: relative;
        }
        .glow-border::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(14,165,233,0.5), rgba(6,182,212,0.2), rgba(14,165,233,0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .glow-border:hover::before { opacity: 1; }

        /* ===== PROGRESS BAR ===== */
        .progress-bar {
            width: 0%;
            transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ===== MOBILE MENU ===== */
        #mobile-menu { display: none; }
        #mobile-menu.open { display: flex; }

        /* ===== CONTENT LAYER ===== */
        .content-layer { position: relative; z-index: 1; }

        /* ===== LANGUAGE TOGGLE ===== */
        #lang-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 13px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.15);
            background: rgba(39, 53, 73, 0.35);
            color: #94A3B8;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition:
                color 0.22s ease,
                border-color 0.22s ease,
                background 0.22s ease,
                transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
                box-shadow 0.22s ease;
            flex-shrink: 0;
            white-space: nowrap;
        }
        #lang-btn:hover {
            color: #F1F5F9;
            border-color: rgba(14, 165, 233, 0.35);
            background: rgba(14, 165, 233, 0.10);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px -4px rgba(14,165,233,0.2);
        }
        #lang-btn:active { transform: scale(0.96); transition-duration: 0.08s; }
        #lang-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

        /* ===== LIGHT THEME OVERRIDES for choice labels ===== */
        label.choice-label {
            background: rgba(39, 53, 73, 0.6);
            border-color: rgba(148, 163, 184, 0.12);
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        label.choice-label:hover {
            background: rgba(39, 53, 73, 0.9);
            border-color: rgba(14, 165, 233, 0.35);
            box-shadow: 0 0 0 1px rgba(14,165,233,0.12);
        }
        label.choice-label span { color: #F1F5F9; }

        /* ===== FOOTER LINKS ===== */
        footer a { transition: color 0.2s ease; }
        footer a:hover { color: #0EA5E9; }

        /* ===== SCROLLBAR MOBILE ===== */
        @media (max-width: 768px) { ::-webkit-scrollbar { width: 3px; } }
    </style>
</head>

<body class="antialiased font-sans flex flex-col min-h-screen">

    <!-- ===== AMBIENT BACKGROUND ===== -->
    <div id="bg-layer" aria-hidden="true">
        <div id="blob1" class="ambient-blob"></div>
        <div id="blob2" class="ambient-blob"></div>
        <div id="blob3" class="ambient-blob"></div>
        <div id="blob4" class="ambient-blob"></div>
    </div>

    <!-- ===== NAVBAR ===== -->
    <header class="sticky top-0 z-50 px-4 pt-4 content-layer">
        <nav class="nav-glass rounded-2xl max-w-6xl mx-auto px-5 py-3 flex items-center justify-between">

            <!-- Logo + Brand -->
            <a href="{% url 'polls:index' %}" class="flex items-center gap-2.5 group">
                <div class="logo-icon group-hover:shadow-[0_4px_20px_rgba(14,165,233,0.6)]">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <rect x="2"  y="9"  width="3" height="7"  rx="1" fill="white" opacity="0.7"/>
                        <rect x="7"  y="5"  width="3" height="11" rx="1" fill="white" opacity="0.9"/>
                        <rect x="12" y="2"  width="3" height="14" rx="1" fill="white"/>
                        <rect x="2"  y="2"  width="3" height="5"  rx="1" fill="white" opacity="0.3"/>
                    </svg>
                </div>
                <span class="font-display font-bold text-lg tracking-tight text-slate-100">
                    My<span class="text-sky-400">Survey</span>
                </span>
            </a>

            <!-- Desktop Nav -->
            <div class="hidden md:flex items-center gap-1">
                <a href="{% url 'polls:index' %}"
                   class="nav-link nav-hover-bg flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium nav-item-text transition-all cursor-pointer">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    <span data-tr="Anketler" data-en="Surveys">Anketler</span>
                </a>

                <a href="/admin/"
                   class="nav-link nav-hover-bg flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium nav-item-text transition-all cursor-pointer">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                    Admin
                </a>

                <div class="w-px h-5 mx-1 bg-slate-700/50"></div>

                <a href="{% url 'polls:user_switch' %}"
                   class="btn-glow flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-sky-500 to-cyan-500 hover:from-sky-400 hover:to-cyan-400 shadow-lg shadow-sky-500/25 hover:shadow-sky-500/40 transition-all cursor-pointer">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span data-tr="Hesap" data-en="Account">Hesap</span>
                </a>

                <!-- Language Toggle -->
                <button id="lang-btn" type="button" aria-label="Dil değiştir" title="TR / EN">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 21a9 9 0 100-18 9 9 0 000 18z"/>
                        <path d="M3.6 9h16.8M3.6 15h16.8M12 3c-2.5 3-3.9 6-3.9 9s1.4 6 3.9 9M12 3c2.5 3 3.9 6 3.9 9s-1.4 6-3.9 9"/>
                    </svg>
                    <span id="lang-label" class="text-xs">TR</span>
                </button>
            </div>

            <!-- Mobile: hamburger -->
            <div class="md:hidden flex items-center gap-2">
                <button id="lang-btn-mobile" type="button" aria-label="Dil değiştir"
                    class="px-3 py-2 rounded-xl text-xs font-semibold nav-item-text nav-hover-bg border border-slate-700/50 transition-all cursor-pointer">
                    <span id="lang-label-m">TR</span>
                </button>
                <button id="hamburger" type="button" aria-label="Menü" aria-expanded="false"
                    class="p-2 rounded-xl nav-item-text nav-hover-bg transition-all cursor-pointer">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6"  x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
            </div>
        </nav>

        <!-- Mobile Menu -->
        <div id="mobile-menu"
             class="nav-glass rounded-2xl max-w-6xl mx-auto mt-2 px-4 py-4 flex-col gap-1">
            <a href="{% url 'polls:index' %}"
               class="flex items-center gap-3 px-4 py-3 rounded-xl nav-item-text nav-hover-bg transition-all cursor-pointer text-sm font-medium">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span data-tr="Anketler" data-en="Surveys">Anketler</span>
            </a>
            <a href="/admin/"
               class="flex items-center gap-3 px-4 py-3 rounded-xl nav-item-text nav-hover-bg transition-all cursor-pointer text-sm font-medium">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944"/>
                </svg>
                Admin
            </a>
            <a href="{% url 'polls:user_switch' %}"
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-sky-400 nav-hover-bg transition-all cursor-pointer text-sm font-semibold">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span data-tr="Hesap" data-en="Account">Hesap</span>
            </a>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="flex-1 content-layer">
        {% if messages %}
        <div class="max-w-6xl mx-auto px-4 sm:px-6 pt-6">
            <div class="flex flex-col gap-3">
            {% for message in messages %}
                <div class="px-5 py-4 rounded-xl text-sm font-semibold shadow-md border flex items-center gap-3 animate-fade-in
                    {% if message.tags == 'success' %}bg-emerald-500/10 border-emerald-500/30 text-emerald-400
                    {% elif message.tags == 'warning' %}bg-amber-500/10 border-amber-500/30 text-amber-400
                    {% elif message.tags == 'error' %}bg-red-500/10 border-red-500/30 text-red-400
                    {% else %}bg-sky-500/10 border-sky-500/30 text-sky-400{% endif %}">
                    {% if message.tags == 'success' %}
                    <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                    {% elif message.tags == 'error' %}
                    <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    {% else %}
                    <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    {% endif %}
                    <span class="leading-relaxed">{{ message }}</span>
                </div>
            {% endfor %}
            </div>
        </div>
        {% endif %}

        <div class="max-w-6xl mx-auto px-4 sm:px-6 pt-8 pb-16">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="content-layer mt-12 pb-6">
        <div class="max-w-6xl mx-auto px-6">
            <div class="border-t border-slate-800/60 pt-6 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-2">
                    <div class="logo-icon" style="width:24px;height:24px;border-radius:7px;">
                        <svg width="13" height="13" viewBox="0 0 18 18" fill="none">
                            <rect x="2"  y="9"  width="3" height="7"  rx="1" fill="white" opacity="0.7"/>
                            <rect x="7"  y="5"  width="3" height="11" rx="1" fill="white" opacity="0.9"/>
                            <rect x="12" y="2"  width="3" height="14" rx="1" fill="white"/>
                        </svg>
                    </div>
                    <span class="text-xs font-semibold text-slate-500">MySurvey</span>
                </div>
                <div class="flex items-center gap-5">
                    <a href="{% url 'polls:index' %}" class="text-xs text-slate-600 hover:text-sky-400 cursor-pointer">
                        <span data-tr="Anketler" data-en="Surveys">Anketler</span>
                    </a>
                    <a href="/admin/" class="text-xs text-slate-600 hover:text-sky-400 cursor-pointer">Admin</a>
                    <a href="{% url 'polls:user_switch' %}" class="text-xs text-slate-600 hover:text-sky-400 cursor-pointer">
                        <span data-tr="Kullanıcı" data-en="Account">Kullanıcı</span>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // ===== LANGUAGE SYSTEM =====
        const POLLS_LANG_KEY = 'polls-lang';

        function getLang() {
            return localStorage.getItem(POLLS_LANG_KEY) || 'tr';
        }

        function applyLang(lang) {
            localStorage.setItem(POLLS_LANG_KEY, lang);
            document.querySelectorAll('[data-tr]').forEach(el => {
                el.textContent = lang === 'en'
                    ? el.getAttribute('data-en')
                    : el.getAttribute('data-tr');
            });
            document.querySelectorAll('[data-tr-placeholder]').forEach(el => {
                el.placeholder = lang === 'en'
                    ? el.getAttribute('data-en-placeholder')
                    : el.getAttribute('data-tr-placeholder');
            });
            const label  = document.getElementById('lang-label');
            const labelM = document.getElementById('lang-label-m');
            if (label)  label.textContent  = lang === 'en' ? 'EN' : 'TR';
            if (labelM) labelM.textContent = lang === 'en' ? 'EN' : 'TR';
        }

        function toggleLang() {
            applyLang(getLang() === 'tr' ? 'en' : 'tr');
        }

        // Init on load
        applyLang(getLang());

        document.getElementById('lang-btn')?.addEventListener('click', toggleLang);
        document.getElementById('lang-btn-mobile')?.addEventListener('click', toggleLang);

        // ===== MOBILE MENU =====
        const hamburger  = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        hamburger?.addEventListener('click', () => {
            const isOpen = mobileMenu.classList.toggle('open');
            hamburger.setAttribute('aria-expanded', String(isOpen));
        });

        // ===== PROGRESS BAR ANIMATION =====
        document.addEventListener('DOMContentLoaded', () => {
            const bars = document.querySelectorAll('[data-progress]');
            setTimeout(() => {
                bars.forEach(bar => { bar.style.width = bar.dataset.progress + '%'; });
            }, 300);
        });

        // ===== PASSWORD TOGGLE =====
        function togglePassword(inputId, btn) {
            const input      = document.getElementById(inputId);
            const eyeIcon    = btn.querySelector('.eye-icon');
            const eyeOffIcon = btn.querySelector('.eye-off-icon');
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon?.classList.add('hidden');
                eyeOffIcon?.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeIcon?.classList.remove('hidden');
                eyeOffIcon?.classList.add('hidden');
            }
        }
    </script>

</body>

</html>
